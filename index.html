﻿<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>변신쿠파스</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #e52228;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #999;
            margin-bottom: 28px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            background: #e52228;
            color: white;
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 20px;
        }

        .badge.ok {
            background: #2da44e;
        }

        label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }

        input:focus, textarea:focus {
            border-color: #e52228;
            background: #fff;
        }

        textarea {
            resize: none;
            height: 80px;
            font-family: inherit;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 14px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: #e52228;
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #444;
            font-size: 13px;
            padding: 10px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-box {
            background: #f8f8f8;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            color: #333;
            word-break: break-all;
            line-height: 1.6;
            margin-top: 12px;
            min-height: 48px;
        }

        .result-box.success {
            border-color: #2da44e;
            background: #f0faf3;
        }

        .result-box.error {
            border-color: #e52228;
            background: #fff5f5;
            color: #c00;
        }

        .copy-btn {
            width: 100%;
            padding: 11px;
            border: 1.5px solid #2da44e;
            border-radius: 10px;
            background: white;
            color: #2da44e;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .copy-btn:active { background: #f0faf3; }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .settings-link {
            font-size: 12px;
            color: #aaa;
            text-decoration: none;
            margin-top: 8px;
            display: block;
            text-align: center;
        }

        #settingsCard { display: none; }

        .divider {
            height: 1px;
            background: #eee;
            margin: 14px 0;
        }

        .img-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .img-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .img-item img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            display: block;
        }

        .dl-btn {
            width: 130px;
            padding: 7px 0;
            border: 1.5px solid #555;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: background 0.2s;
        }

        .dl-btn:active { background: #f0f0f0; }

        .btn-all-dl {
            background: #333;
            color: white;
            border: none;
        }

        .btn-all-dl:active { background: #111; }

        .video-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .video-item video {
            width: 100%;
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            max-height: 300px;
            background: #000;
        }
    </style>
</head>
<body>

    <h1>시도의 변신쿠파스</h1>
    <p class="subtitle">(쿠파스마스터님의 수강생 제작입니다. 쓰레드 접으면 사라질수도..)</p>

    <!-- API 키 설정 카드 -->
    <div class="card" id="settingsCard">
        <div class="card-title">
            🔑 API 키 설정
            <span class="badge" id="keyBadge">미설정</span>
        </div>
        <label>Access Key</label>
        <input type="text" id="accessKey" placeholder="쿠팡 파트너스 Access Key">
        <label>Secret Key</label>
        <input type="password" id="secretKey" placeholder="쿠팡 파트너스 Secret Key">
        <label>Sub ID <span style="color:#bbb;font-weight:400">(선택, 채널 구분용)</span></label>
        <input type="text" id="subId" placeholder="예: blog, instagram, youtube">
        <button class="btn btn-primary" onclick="saveKeys()">저장</button>
    </div>

    <!-- 메인 변환 카드 -->
    <div class="card">
        <div class="card-title">
            🔗 링크 변환
            <span class="badge ok" id="mainKeyBadge" style="display:none">키 저장됨</span>
        </div>
        <label>쿠팡 상품 URL</label>
        <textarea id="targetUrl" placeholder="https://www.coupang.com/vp/products/..."></textarea>
        <button class="btn btn-primary" id="convertBtn" onclick="convertLink()">파트너스 링크로 변환</button>

        <div id="resultArea" style="display:none">
            <div class="divider"></div>
            <div class="result-box" id="resultBox"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyResult()">복사</button>
        </div>

        <a href="#" class="settings-link" onclick="toggleSettings(); return false;" id="settingsToggle">⚙️ API 키 설정</a>
    </div>

    <!-- 스레드 이미지 다운로드 카드 -->
    <div class="card">
        <div class="card-title">
            📸 스레드 이미지 다운로드
        </div>
        <label>스레드 게시글 URL</label>
        <input type="text" id="threadsUrl" placeholder="https://www.threads.com/@유저/post/...">
        <button class="btn btn-primary" id="threadsBtn" onclick="fetchThreadsImages()">이미지 가져오기</button>

        <div id="threadsResult" style="display:none">
            <div class="divider"></div>
            <div id="threadsMsg" class="result-box" style="display:none"></div>
            <div id="threadsImgGrid" class="img-grid"></div>
            <button class="btn btn-secondary btn-all-dl" id="threadsAllDlBtn" style="display:none; margin-top:14px" onclick="downloadAll()">사진 전체 다운로드</button>
            <div id="threadsVideoArea" style="display:none; margin-top:12px">
                <div class="card-title" style="margin-bottom:8px">🎬 동영상</div>
                <div id="threadsVideoList" style="display:flex;flex-direction:column;gap:12px"></div>
            </div>
            <div id="threadsCoupangArea" style="display:none">
                <div class="divider"></div>
                <div class="card-title" style="margin-top:4px">🔗 발견된 쿠팡 링크 → 내 파트너스로 변환</div>
                <div id="threadsCoupangList"></div>
            </div>
        </div>
    </div>

    <script>
        let resultUrl = '';

        function saveThreadsToken() {
            const t = document.getElementById('threadsToken').value.trim();
            if (!t) { alert('토큰을 입력해주세요.'); return; }
            localStorage.setItem('threads_token', t);
            alert('토큰이 저장됐어요.');
        }

        function init() {
            const savedToken = localStorage.getItem('threads_token');
            if (savedToken) document.getElementById('threadsToken').value = savedToken;
            const access = localStorage.getItem('coupang_access');
            const secret = localStorage.getItem('coupang_secret');
            const sub = localStorage.getItem('coupang_subid');
            if (access && secret) {
                document.getElementById('keyBadge').textContent = '설정됨';
                document.getElementById('keyBadge').className = 'badge ok';
                document.getElementById('mainKeyBadge').style.display = 'inline';
                document.getElementById('settingsToggle').textContent = '⚙️ API 키 변경';
                document.getElementById('accessKey').value = access;
                document.getElementById('secretKey').value = secret;
                if (sub) document.getElementById('subId').value = sub;
            } else {
                document.getElementById('settingsCard').style.display = 'block';
            }
        }

        function toggleSettings() {
            const card = document.getElementById('settingsCard');
            card.style.display = card.style.display === 'none' ? 'block' : 'none';
        }

        function saveKeys() {
            const access = document.getElementById('accessKey').value.trim();
            const secret = document.getElementById('secretKey').value.trim();
            const sub = document.getElementById('subId').value.trim();
            if (!access || !secret) {
                alert('Access Key와 Secret Key를 모두 입력해주세요.');
                return;
            }
            localStorage.setItem('coupang_access', access);
            localStorage.setItem('coupang_secret', secret);
            if (sub) localStorage.setItem('coupang_subid', sub);
            else localStorage.removeItem('coupang_subid');
            document.getElementById('keyBadge').textContent = '설정됨';
            document.getElementById('keyBadge').className = 'badge ok';
            document.getElementById('mainKeyBadge').style.display = 'inline';
            document.getElementById('settingsToggle').textContent = '⚙️ API 키 변경';
            document.getElementById('settingsCard').style.display = 'none';
            alert('API 키가 저장되었습니다.');
        }

        async function convertLink() {
            const accessKey = localStorage.getItem('coupang_access');
            const secretKey = localStorage.getItem('coupang_secret');
            if (!accessKey || !secretKey) {
                document.getElementById('settingsCard').style.display = 'block';
                alert('먼저 API 키를 설정해주세요.');
                return;
            }

            const url = document.getElementById('targetUrl').value.trim();
            if (!url) {
                alert('쿠팡 상품 URL을 입력해주세요.');
                return;
            }

            const btn = document.getElementById('convertBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>변환 중...';
            document.getElementById('resultArea').style.display = 'none';

            try {
                const response = await fetch('/api/deeplink', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, accessKey, secretKey, subId: localStorage.getItem('coupang_subid') || '' })
                });

                const data = await response.json();

                const box = document.getElementById('resultBox');
                document.getElementById('resultArea').style.display = 'block';

                if (data.rCode === '0' && data.data && data.data[0]) {
                    resultUrl = data.data[0].shortenUrl || data.data[0].landingUrl;
                    box.className = 'result-box success';
                    box.textContent = resultUrl;
                    document.getElementById('copyBtn').style.display = 'block';
                } else {
                    resultUrl = '';
                    box.className = 'result-box error';
                    box.textContent = '오류: ' + (data.rMessage || JSON.stringify(data));
                    document.getElementById('copyBtn').style.display = 'none';
                }
            } catch (err) {
                document.getElementById('resultArea').style.display = 'block';
                const box = document.getElementById('resultBox');
                box.className = 'result-box error';
                box.textContent = '서버 오류: ' + err.message;
                document.getElementById('copyBtn').style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '파트너스 링크로 변환';
            }
        }

        async function copyResult() {
            if (!resultUrl) return;
            try {
                await navigator.clipboard.writeText(resultUrl);
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✅ 복사됨!';
                setTimeout(() => { btn.textContent = '복사'; }, 2000);
            } catch {
                prompt('아래 링크를 복사하세요:', resultUrl);
            }
        }

        let threadImages = [];

        async function fetchThreadsImages() {
            const url = document.getElementById('threadsUrl').value.trim();
            if (!url) { alert('스레드 게시글 URL을 입력해주세요.'); return; }

            const btn = document.getElementById('threadsBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>가져오는 중...';
            document.getElementById('threadsResult').style.display = 'none';
            document.getElementById('threadsImgGrid').innerHTML = '';
            document.getElementById('threadsAllDlBtn').style.display = 'none';
            document.getElementById('threadsVideoArea').style.display = 'none';
            document.getElementById('threadsVideoList').innerHTML = '';
            document.getElementById('threadsCoupangArea').style.display = 'none';
            document.getElementById('threadsCoupangList').innerHTML = '';
            threadImages = [];

            try {
                const res = await fetch('/api/threads-images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, token: localStorage.getItem('threads_token') || '' }),
                });
                const data = await res.json();
                const msg = document.getElementById('threadsMsg');
                const grid = document.getElementById('threadsImgGrid');
                document.getElementById('threadsResult').style.display = 'block';

                if (data.error) {
                    msg.className = 'result-box error';
                    msg.textContent = data.error;
                    msg.style.display = 'block';
                    return;
                }

                if ((!data.images || data.images.length === 0) && (!data.videos || data.videos.length === 0) && (!data.coupangLinks || data.coupangLinks.length === 0)) {
                    msg.className = 'result-box';
                    msg.textContent = data.message || '이미지나 링크를 찾을 수 없어요.';
                    msg.style.display = 'block';
                    return;
                }

                msg.style.display = 'none';
                threadImages = data.images || [];

                threadImages.forEach((imgUrl, i) => {
                    const item = document.createElement('div');
                    item.className = 'img-item';
                    item.innerHTML = `
                        <img src="${imgUrl}" onerror="this.style.opacity=0.3">
                        <a class="dl-btn" onclick="downloadOne('${encodeURIComponent(imgUrl)}', ${i+1}, false)">⬇ 다운로드</a>
                    `;
                    grid.appendChild(item);
                });

                if (threadImages.length > 1) {
                    document.getElementById('threadsAllDlBtn').style.display = 'block';
                }

                // 동영상
                const videos = data.videos || [];
                if (videos.length > 0) {
                    document.getElementById('threadsVideoArea').style.display = 'block';
                    const vList = document.getElementById('threadsVideoList');
                    videos.forEach((vidUrl, i) => {
                        const item = document.createElement('div');
                        item.className = 'video-item';
                        item.innerHTML = `
                            <video src="${vidUrl}" controls playsinline preload="metadata"></video>
                            <a class="dl-btn" onclick="downloadOne('${encodeURIComponent(vidUrl)}', ${i+1}, true)">⬇ 동영상 다운로드</a>
                        `;
                        vList.appendChild(item);
                    });
                }

                // 쿠팡 링크 변환
                if (data.coupangLinks && data.coupangLinks.length > 0) {
                    document.getElementById('threadsCoupangArea').style.display = 'block';
                    await convertCoupangLinks(data.coupangLinks);
                }
            } catch (err) {
                document.getElementById('threadsResult').style.display = 'block';
                const msg = document.getElementById('threadsMsg');
                msg.className = 'result-box error';
                msg.textContent = '오류: ' + err.message;
                msg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '이미지 가져오기';
            }
        }

        async function convertCoupangLinks(links) {
            const accessKey = localStorage.getItem('coupang_access');
            const secretKey = localStorage.getItem('coupang_secret');
            const list = document.getElementById('threadsCoupangList');

            for (const link of links) {
                const row = document.createElement('div');
                row.style.marginBottom = '10px';

                if (!accessKey || !secretKey) {
                    row.innerHTML = `<div class="result-box" style="font-size:12px;word-break:break-all">${link}</div><div style="font-size:11px;color:#e52228;margin-top:4px">⚠ API 키를 설정하면 자동 변환돼요.</div>`;
                    list.appendChild(row);
                    continue;
                }

                row.innerHTML = `<div class="result-box" style="font-size:12px;color:#999">변환 중...</div>`;
                list.appendChild(row);

                try {
                    const res = await fetch('/api/deeplink', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: link, accessKey, secretKey, subId: localStorage.getItem('coupang_subid') || '' }),
                    });
                    const data = await res.json();

                    if (data.rCode === '0' && data.data && data.data[0]) {
                        const converted = data.data[0].shortenUrl || data.data[0].landingUrl;
                        row.innerHTML = `
                            <div class="result-box success" style="font-size:12px;word-break:break-all">${converted}</div>
                            <button class="copy-btn" style="margin-top:6px;font-size:13px" onclick="copyText(this, '${converted}')">복사</button>
                        `;
                    } else {
                        row.innerHTML = `<div class="result-box" style="font-size:11px;word-break:break-all;color:#888">원본: ${link}</div><div style="font-size:11px;color:#e52228;margin-top:2px">변환 실패: ${data.rMessage || '오류'}</div>`;
                    }
                } catch (e) {
                    row.innerHTML = `<div class="result-box error" style="font-size:12px">오류: ${e.message}</div>`;
                }
            }
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✅ 복사됨!';
                setTimeout(() => { btn.textContent = '복사'; }, 2000);
            }).catch(() => { prompt('복사하세요:', text); });
        }

        function showVideoOverlay(videoUrl) {
            const old = document.getElementById('_vOverlay');
            if (old) old.remove();
            const ov = document.createElement('div');
            ov.id = '_vOverlay';
            ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
            ov.innerHTML = `
                <div style="position:absolute;top:14px;right:14px;">
                    <button onclick="document.getElementById('_vOverlay').remove()"
                        style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;">✕</button>
                </div>
                <video src="${videoUrl}" controls playsinline autoplay
                    style="width:100%;max-height:72vh;object-fit:contain;"></video>
                <div style="text-align:center;padding:0 24px;">
                    <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;">📱 영상을 꾹 눌러 저장하세요</div>
                    <div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.7;">
                        영상 위에서 손가락으로 <b style="color:#fff">꾹 누르기</b><br>
                        → <b style="color:#4ade80">"비디오 저장"</b> 선택
                    </div>
                </div>`;
            document.body.appendChild(ov);
        }

        const PROXY       = 'https://corsproxy.io/?';
        const MEDIA_PROXY = '/api/media-proxy?url=';

        async function fetchBlob(url) {
            for (const target of [
                MEDIA_PROXY + encodeURIComponent(url),
                url,
                PROXY + encodeURIComponent(url)
            ]) {
                try {
                    const r = await fetch(target);
                    if (r.ok) return await r.blob();
                } catch(e) {}
            }
            return null;
        }

        async function downloadOne(encodedUrl, idx, isVideo) {
            const rawUrl = decodeURIComponent(encodedUrl);
            const ext   = isVideo ? 'mp4' : 'jpg';
            const mime  = isVideo ? 'video/mp4' : 'image/jpeg';
            const fname = `threads_${idx}.${ext}`;
            const blob  = await fetchBlob(rawUrl);
            if (blob) {
                const file = new File([blob], fname, {type: mime});
                const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                if (isIOS && navigator.canShare?.({files: [file]})) {
                    try { await navigator.share({files: [file], title: fname}); return; }
                    catch(e) { if (e.name === 'AbortError') return; }
                }
                const a = document.createElement('a');
                a.href = URL.createObjectURL(file);
                a.download = fname;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
                return;
            }
            // blob 실패 → media-proxy URL로 직접 열기 (Content-Disposition: attachment)
            window.open(MEDIA_PROXY + encodeURIComponent(rawUrl), '_blank');
        }

        async function downloadAll() {
            for (let i = 0; i < threadImages.length; i++) {
                await new Promise(r => setTimeout(r, 400));
                await downloadOne(encodeURIComponent(threadImages[i]), i + 1, false);
            }
        }

        init();
    </script>
</body>
</html>
